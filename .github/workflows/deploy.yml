name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: gen-lang-client-0981591737
  REGION: asia-south1
  REPO: cloud-run-apps
  SERVICE: conversational-ai-playground

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-cloud-run
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/772545827002/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: github-deployer@gen-lang-client-0981591737.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image with Cloud Build
        run: |
          gcloud builds submit \
            --project "$PROJECT_ID" \
            --config cloudbuild.yaml \
            --substitutions "_TAG=${{ github.sha }},_REGION=$REGION,_REPO=$REPO,_SERVICE=$SERVICE"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$REGION-docker.pkg.dev/$PROJECT_ID/$REPO/$SERVICE:${{ github.sha }}" \
            --quiet

      - name: Show service URL
        run: |
          gcloud run services describe "$SERVICE" \
            --project "$PROJECT_ID" --region "$REGION" \
            --format "value(status.url)"
