name: Build and publish image

# Builds the app image and pushes it to Artifact Registry. The playground VM
# (playground-vm, asia-south1-a) polls the registry every 2 minutes via a
# systemd timer (/etc/systemd/system/deploy.timer) and redeploys :latest
# automatically — no deploy step is needed here.
#
# Serving: https://35-234-215-193.sslip.io (Caddy on the VM, static IP
# playground-ip). The old Cloud Run service was decommissioned 2026-07-11
# because Cloud Run has no UDP egress, which broke WebRTC voice media.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: gen-lang-client-0981591737
  REGION: asia-south1
  REPO: cloud-run-apps
  SERVICE: conversational-ai-playground

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-cloud-run
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/772545827002/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: github-deployer@gen-lang-client-0981591737.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image with Cloud Build
        run: |
          gcloud builds submit \
            --project "$PROJECT_ID" \
            --config cloudbuild.yaml \
            --substitutions "_TAG=${{ github.sha }},_REGION=$REGION,_REPO=$REPO,_SERVICE=$SERVICE"
